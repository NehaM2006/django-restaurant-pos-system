{% extends "restaurant/base/base.html" %}
{% load static %}

{% block content %}

<link rel="stylesheet" href="{% static 'restaurant/css/login.css' %}">

<div class="login-page">

    {% include "restaurant/semantics/header.html" %}

    <div class="container">

        <div class="row justify-content-center align-items-center vh-100">

            <div class="col-lg-5 col-md-8">

                <div class="login-card">

                    <h1 class="text-center mb-2">
                        Welcome Back 👋
                    </h1>

                    <p class="text-center text-light mb-4">
                        Sign in to continue ordering delicious food.
                    </p>

                    <form method="POST">

                        {% csrf_token %}

                        <div class="mb-3">

                            <label class="form-label">
                                Username
                            </label>

                            {{ login_form.username }}

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Password
                            </label>

                            {{ login_form.password }}

                        </div>

                        <div class="form-check mb-4">

                            <input class="form-check-input"
                                   type="checkbox"
                                   onclick="togglePassword()">

                            <label class="form-check-label">

                                Show Password

                            </label>

                        </div>

                        <button class="btn login-btn w-100">

                            Login

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<script>

function togglePassword(){

    let password=document.getElementById("password_id");

    if(password.type==="password")
        password.type="text";
    else
        password.type="password";

}

</script>

{% endblock %}
