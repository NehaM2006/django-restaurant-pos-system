{% load static %}
<link type="text/css" rel="stylesheet" href="{% static 'restaurant/css/header.css' %}">

<header>
    <div class="navigator">
        <nav class="navbar navbar-expand-lg sticky-top" style="box-shadow: none;">
            <div class="container">
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent" aria-controls="navbarContent" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarContent">
                    <ul class="navbar-nav align-items-center w-100 justify-content-between">
                        <li class="nav-item logo text-start" style="width: 10%;">
                            <a href="{% url 'index' %}">
                                <img class="logo" src="{% static 'restaurant/img/logo.jpg' %}">
                            </a>
                        </li>
                        <li class="nav-item text-center">
                            <a class="nav-link d-inline-block" href="{% url 'index' %}">Home</a>
                            <a class="nav-link d-inline-block" href="{% url 'details' %}">Details</a>
                        </li>
                        <li class="nav-item text-end">
                            {% if not user.is_authenticated %}
                                <a class="nav-link" href="{% url 'login' %}">Login</a>
                            {% else %}
                                <a class="nav-link" href="{% url 'logout' %}">Logout</a>
                            {% endif %}
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </div>
</header>
